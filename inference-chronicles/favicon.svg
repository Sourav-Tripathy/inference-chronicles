<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Connection Lines -->
  <line x1="20" y1="50" x2="80" y2="50" stroke="#1f223d" stroke-width="8" stroke-linecap="round" />
  <line x1="20" y1="50" x2="50" y2="50" stroke="#39ff14" stroke-width="8" stroke-linecap="round" />
  
  <!-- Active Node Glow Ring -->
  <circle cx="50" cy="50" r="22" fill="none" stroke="#00ffcc" stroke-width="4" opacity="0.4" />
  
  <!-- Center Node (Active - Cyan) -->
  <circle cx="50" cy="50" r="14" fill="#00ffcc" />
  
  <!-- Left Node (Completed - Green) -->
  <circle cx="20" cy="50" r="10" fill="#39ff14" />
  
  <!-- Right Node (Locked - Dark with Magenta border) -->
  <circle cx="80" cy="50" r="10" fill="#111322" stroke="#ff007f" stroke-width="3" />
</svg>
